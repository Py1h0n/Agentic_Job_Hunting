<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JobSearch — Sign In</title>
<link rel="stylesheet" href="/static/style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.auth-box{width:100%;max-width:380px;}
.auth-logo{text-align:center;margin-bottom:32px;}
.auth-logo h1{font-size:22px;font-weight:700;}
.auth-logo h1 span{color:var(--accent);}
.auth-logo p{color:var(--muted);font-size:13px;margin-top:6px;}
.auth-tabs{display:flex;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:24px;}
.auth-tab{flex:1;text-align:center;padding:7px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .2s;}
.auth-tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.4);}
.error-msg{color:var(--danger);font-size:12px;margin-top:12px;text-align:center;min-height:18px;}
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">
    <h1>Job<span>Scout</span></h1>
    <p>AI-powered job search</p>
  </div>
  <div class="card">
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;" onclick="submit()" id="submit-btn">
      Sign In
    </button>
    <p class="error-msg" id="err"></p>
  </div>
</div>
<div id="toast"></div>
<script>
let mode = 'login';
function switchTab(m) {
  mode = m;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (m==='login')===!i));
  document.getElementById('submit-btn').textContent = m === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('err').textContent = '';
}
async function submit() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('err');
  if (!email || !password) { err.textContent = 'All fields required'; return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Please wait…';
  try {
    const r = await fetch(`/api/auth/${mode}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.detail || 'Error'; btn.disabled=false; btn.textContent=mode==='login'?'Sign In':'Create Account'; return; }
    window.location.href = d.role === 'admin' ? '/admin' : '/dashboard';
  } catch(e) { err.textContent = 'Network error'; btn.disabled=false; }
}
document.addEventListener('keydown', e => { if(e.key==='Enter') submit(); });
</script>
</body>
</html>
