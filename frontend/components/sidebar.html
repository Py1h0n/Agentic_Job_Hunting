    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wide px-3 py-2" id="section-core">

    <a href="/dashboard/saved-jobs.html" class="nav-item" data-page="saved">

<style>
#sidebar {
  border-right: 1px solid #e2e8f0;
  background: #ffffff;
  position: relative;
  z-index: 50;
}

#sidebar.collapsed {
  width: 72px !important;
}

#sidebar.collapsed .nav-text,
#sidebar.collapsed .badge,
#sidebar.collapsed .badge-count,
#sidebar.collapsed #section-core,
#sidebar.collapsed #section-ai,
#sidebar.collapsed #logo-text,
#sidebar.collapsed .nav-item span:not(.material-symbols-outlined),
#sidebar.collapsed #user-profile > div:not(:first-child) {
  display: none;
}

#sidebar.collapsed .nav-item {
  justify-content: center;
  padding: 10px;
}

#sidebar.collapsed .nav-item::before {
  display: none;
}

#sidebar.collapsed #user-profile {
  justify-content: center;
}

#sidebar.collapsed #collapse-icon {
  transform: rotate(180deg);
}

#sidebar #collapse-icon {
  transition: transform 0.3s ease;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 12px;
  color: #475569;
  text-decoration: none;
  transition: all 0.2s ease;
  font-weight: 500;
  font-size: 14px;
}

.nav-item:hover {
  background: #f1f5f9;
  color: #0f172a;
}

.nav-item:hover .material-symbols-outlined {
  color: #4f46e5;
}

.nav-item.active {
  background: #eef2ff;
  color: #4f46e5;
  position: relative;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 24px;
  background: #4f46e5;
  border-radius: 0 4px 4px 0;
}

.ai-section {
  background: #f8faff;
  border-radius: 16px;
  padding: 8px;
  margin: 8px 0;
}

.badge {
  background: #eef2ff;
  color: #4f46e5;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  margin-left: auto;
}

.badge-count {
  background: #4f46e5;
  color: white;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  margin-left: auto;
}

.material-symbols-outlined {
  font-size: 20px;
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  flex-shrink: 0;
}
</style>

<script>
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('collapsed');
}

(function() {
  const path = window.location.pathname;
  const page = path.split('/').pop().replace('.html', '') || 'job-search';
  
  document.querySelectorAll('.nav-item').forEach(item => {
    const itemPage = item.dataset.page;
    if (
      (page === 'job-search' && itemPage === 'search') ||
      (page === 'saved-jobs' && itemPage === 'saved') ||
      (page === 'resume' && itemPage === 'resume') ||
      (page === 'insights' && itemPage === 'insights') ||
      (page === 'best-matches' && itemPage === 'matches') ||
      (page === 'settings' && itemPage === 'settings')
    ) {
      item.classList.add('active');
    }
  });

  fetch('/api/resume/status', { credentials: 'include' })
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      const badge = document.getElementById('resume-badge');
      if (badge && data.status) {
        if (data.status === 'ready') {
          badge.textContent = 'Ready';
          badge.style.background = '#dcfce7';
          badge.style.color = '#166534';
        } else if (data.status === 'processing') {
          badge.textContent = 'Processing';
          badge.style.background = '#fef3c7';
          badge.style.color = '#92400e';
        } else {
          badge.textContent = 'Not uploaded';
        }
      }
    })
    .catch(() => {});

  fetch('/api/search/saved?limit=1', { credentials: 'include' })
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      const countEl = document.getElementById('matches-count');
      if (countEl && data.total !== undefined) {
        countEl.textContent = data.total;
      }
    })
    .catch(() => {});
})();
</script>
