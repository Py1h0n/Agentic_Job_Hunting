  <!-- Logo -->
  <div class="p-4 border-b border-slate-200 flex items-center justify-between">
    <span class="font-manrope font-bold text-lg text-indigo-700" id="logo-text">AI Career</span>
    <button onclick="toggleSidebar()" class="p-1.5 hover:bg-slate-100 rounded-lg transition-colors">
      <span class="material-symbols-outlined text-slate-500" id="collapse-icon">chevron_left</span>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
    <!-- Core Section -->
    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wide px-3 py-2" id="section-core">
      Core
    </div>
    <a href="/dashboard/search-jobs.html" class="nav-item" data-page="search">
      <span class="material-symbols-outlined">search</span>
      <span class="nav-text">Search</span>
    </a>
    <a href="/dashboard/saved-jobs.html" class="nav-item" data-page="saved">
      <span class="material-symbols-outlined">bookmark</span>
      <span class="nav-text">Saved Jobs</span>
    </a>

    <!-- AI Section (highlighted) -->
    <div class="ai-section" id="ai-section-container">
      <div class="text-xs font-semibold text-slate-400 uppercase tracking-wide px-3 py-2" id="section-ai">
        AI Assistant
      </div>
      <a href="/dashboard/resume.html" class="nav-item" data-page="resume">
        <span class="material-symbols-outlined">description</span>
        <span class="nav-text">Resume</span>
      </a>
      <a href="/dashboard/best-matches.html" class="nav-item" data-page="matches">
        <span class="material-symbols-outlined">workspace_premium</span>
        <span class="nav-text">Best Matches</span>
        <!-- Badge removed for Best Matches - shows saved jobs count which is confusing -->
      </a>
      <a href="/dashboard/insights.html" class="nav-item" data-page="insights">
        <span class="material-symbols-outlined">psychology</span>
        <span class="nav-text">Insights</span>
      </a>
    </div>
  </nav>

  <!-- Settings (bottom) -->
  <div class="p-3 border-t border-slate-200">
    <a href="/dashboard/settings.html" class="nav-item" data-page="settings">
      <span class="material-symbols-outlined">settings</span>
      <span class="nav-text">Settings</span>
    </a>
  </div>

  <!-- User Profile (bottom) -->
  <div class="p-4 border-t border-slate-200">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3" id="user-profile">
        <div class="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold flex-shrink-0" id="user-avatar">
          <span class="animate-pulse">...</span>
        </div>
        <div class="nav-text">
          <p class="text-sm font-medium text-slate-900" id="user-name">Loading...</p>
          <p class="text-xs text-slate-500" id="user-plan">...</p>
        </div>
      </div>
      <button onclick="logout()" class="p-2 hover:bg-red-50 rounded-lg" title="Sign Out">
        <span class="material-symbols-outlined text-red-500">logout</span>
      </button>
    </div>
  </div>
</aside>

<style>
#sidebar {
  border-right: 1px solid #e2e8f0;
  background: #ffffff;
  position: relative;
  z-index: 50;
}

#sidebar.collapsed {
  width: 72px !important;
}

#sidebar.collapsed .nav-text,
#sidebar.collapsed .badge,
#sidebar.collapsed .badge-count,
#sidebar.collapsed #section-core,
#sidebar.collapsed #section-ai,
#sidebar.collapsed #logo-text,
#sidebar.collapsed .nav-item span:not(.material-symbols-outlined),
#sidebar.collapsed #user-profile > div:not(:first-child) {
  display: none;
}

#sidebar.collapsed .nav-item {
  justify-content: center;
  padding: 10px;
}

#sidebar.collapsed .nav-item::before {
  display: none;
}

#sidebar.collapsed #user-profile {
  justify-content: center;
}

#sidebar.collapsed #collapse-icon {
  transform: rotate(180deg);
}

#sidebar #collapse-icon {
  transition: transform 0.3s ease;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 12px;
  color: #475569;
  text-decoration: none;
  transition: all 0.2s ease;
  font-weight: 500;
  font-size: 14px;
}

.nav-item:hover {
  background: #f1f5f9;
  color: #0f172a;
}

.nav-item:hover .material-symbols-outlined {
  color: #4f46e5;
}

.nav-item.active {
  background: #eef2ff;
  color: #4f46e5;
  position: relative;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 24px;
  background: #4f46e5;
  border-radius: 0 4px 4px 0;
}

.ai-section {
  background: #f8faff;
  border-radius: 16px;
  padding: 8px;
  margin: 8px 0;
}

.badge {
  background: #eef2ff;
  color: #4f46e5;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  margin-left: auto;
}

.badge-count {
  background: #4f46e5;
  color: white;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  margin-left: auto;
}

.material-symbols-outlined {
  font-size: 20px;
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  flex-shrink: 0;
}
</style>

<script>
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('collapsed');
}

// Load user data dynamically
async function loadUserData() {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'same-origin' });
    if (!res.ok) throw new Error('Not authenticated');
    const user = await res.json();
    
    const initial = (user.name && user.name[0]) || (user.email && user.email[0]) || '?';
    const displayName = user.name || user.email || 'User';
    
    // Update sidebar user profile
    const sidebarAvatar = document.getElementById('user-avatar');
    if (sidebarAvatar) {
      sidebarAvatar.innerHTML = initial.toUpperCase();
      const nameEl = document.getElementById('user-name');
      const planEl = document.getElementById('user-plan');
      if (nameEl) nameEl.textContent = displayName;
      if (planEl) planEl.textContent = (user.plan || 'Free') + ' Plan';
    }
    
    // Update header avatar if exists (top right corner)
    const headerAvatar = document.getElementById('header-avatar');
    if (headerAvatar) {
      headerAvatar.innerHTML = `
        <a href="/dashboard/settings.html" class="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-sm hover:bg-indigo-200 transition-colors">
          ${initial.toUpperCase()}
        </a>
      `;
    }
  } catch (err) {
    console.warn('Could not load user data:', err);
    const avatar = document.getElementById('user-avatar');
    if (avatar) {
      avatar.innerHTML = '?';
      const nameEl = document.getElementById('user-name');
      const planEl = document.getElementById('user-plan');
      if (nameEl) nameEl.textContent = 'Guest';
      if (planEl) planEl.textContent = 'Free Plan';
    }
    // Hide header avatar on error or show default
    const headerAvatar = document.getElementById('header-avatar');
    if (headerAvatar) {
      headerAvatar.innerHTML = `
        <a href="/auth/login.html" class="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-sm hover:bg-indigo-200 transition-colors">
          ?
        </a>
      `;
    }
  }
}

// Initialize user data when sidebar loads
loadUserData();

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/auth/login.html';
}

(function() {
  const path = window.location.pathname;
  const page = path.split('/').pop().replace('.html', '') || 'search-jobs';
  
  document.querySelectorAll('.nav-item').forEach(item => {
    const itemPage = item.dataset.page;
    if (
      (page === 'search-jobs' && itemPage === 'search') ||
      (page === 'saved-jobs' && itemPage === 'saved') ||
      (page === 'resume' && itemPage === 'resume') ||
      (page === 'insights' && itemPage === 'insights') ||
      (page === 'best-matches' && itemPage === 'matches') ||
      (page === 'settings' && itemPage === 'settings')
    ) {
      item.classList.add('active');
    }
  });
})();
</script>
