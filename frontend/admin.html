<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JobScout — Admin</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav class="nav">
  <div class="nav-brand">Job<span>Scout</span> <span style="font-size:11px;color:var(--danger);background:#2d1515;padding:2px 8px;border-radius:20px;font-weight:600;margin-left:4px;">ADMIN</span></div>
  <div class="nav-right">
    <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
  </div>
</nav>
<div class="page">
  <div class="stats" id="stats-grid"></div>

  <div class="tabs">
    <div class="tab active" onclick="setTab('users')">Users</div>
    <div class="tab" onclick="setTab('searches')">Searches</div>
  </div>

  <div id="tab-users" class="tab-content active">
    <div id="users-area"><div class="empty"><div class="spin" style="margin:0 auto;"></div></div></div>
  </div>

  <div id="tab-searches" class="tab-content">
    <div id="searches-area"></div>
  </div>
</div>
<div id="toast"></div>
<script>
(async ()=>{ loadStats(); loadUsers(); })();

function setTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['users','searches'][i]===name));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='searches') loadSearches();
}

async function loadStats(){
  const s=await api('/api/admin/stats');
  document.getElementById('stats-grid').innerHTML=[
    ['Total Users',s.users],['Total Searches',s.searches],
    ['Running Now',s.running],['Jobs Indexed',s.jobs]
  ].map(([l,v])=>`<div class="stat"><div class="stat-value">${v}</div><div class="stat-label">${l}</div></div>`).join('');
}

async function loadUsers(){
  const users=await api('/api/admin/users');
  document.getElementById('users-area').innerHTML=`
  <div class="card" style="padding:0"><div class="table-wrap"><table>
    <thead><tr><th>Email</th><th>Role</th><th>Searches</th><th>Last search</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${users.map(u=>`<tr id="urow-${u.id}">
      <td><b>${u.email}</b></td>
      <td><span class="badge badge-${u.role==='admin'?'running':'queued'}">${u.role}</span></td>
      <td>${u.searches}</td>
      <td style="color:var(--muted)">${u.last_search?u.last_search.slice(0,16):'—'}</td>
      <td><span class="badge badge-${u.is_active?'success':'failed'}">${u.is_active?'Active':'Inactive'}</span></td>
      <td style="display:flex;gap:6px;">
        <button class="btn btn-ghost btn-sm" onclick="toggleUser(${u.id},${u.is_active})">${u.is_active?'Deactivate':'Activate'}</button>
        ${u.role!=='admin'?`<button class="btn btn-ghost btn-sm" onclick="makeAdmin(${u.id})">Make Admin</button>`:''}
      </td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}

async function loadSearches(){
  const rows=await api('/api/admin/searches');
  document.getElementById('searches-area').innerHTML=`
  <div class="card" style="padding:0"><div class="table-wrap"><table>
    <thead><tr><th>User</th><th>Query</th><th>Agent</th><th>Status</th><th>Jobs</th><th>Date</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td style="color:var(--muted)">${r.email}</td>
      <td><b>${r.query}</b>${r.location?` · ${r.location}`:''}</td>
      <td>${r.agent}</td>
      <td><span class="badge badge-${r.status}">${r.status==='running'?'<span class="pulse"></span> ':''} ${r.status}</span></td>
      <td>${r.total_found}</td>
      <td style="color:var(--muted)">${r.created_at.slice(0,16)}</td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}

async function toggleUser(uid,active){
  await api(`/api/admin/users/${uid}/toggle`,'POST');
  toast(active?'User deactivated':'User activated','ok');
  loadUsers();
}

async function makeAdmin(uid){
  if(!confirm('Make this user an admin?')) return;
  await api(`/api/admin/users/${uid}/role?role=admin`,'POST');
  toast('Role updated','ok'); loadUsers();
}

async function logout(){await fetch('/api/auth/logout',{method:'POST'});window.location.href='/';}

async function api(url,method='GET'){
  const r=await fetch(url,{method});
  if(r.status===401||r.status===403){window.location.href='/';return;}
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;setTimeout(()=>t.className='',2500);}
</script>
</body>
</html>
