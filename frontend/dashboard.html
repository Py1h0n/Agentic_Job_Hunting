<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JobScout — Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.search-card{margin-bottom:28px;}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.job-url{color:var(--accent);font-size:12px;}
.save-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:2px 6px;transition:color .15s;}
.save-btn.saved{color:#f59e0b;}
.save-btn:hover{color:#f59e0b;}
.progress-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:12px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s;}
#queue-info{font-size:12px;color:var(--muted);margin-top:8px;min-height:18px;}
.tab-content{display:none;} .tab-content.active{display:block;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.filter-row input{flex:1;min-width:160px;padding:7px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-brand">Job<span>Scout</span></div>
  <div class="nav-right">
    <span id="user-email" style="color:var(--muted);font-size:13px;"></span>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Sign out</button>
  </div>
</nav>

<div class="page">
  <!-- Search Form -->
  <div class="card search-card">
    <div class="section-title">New Search</div>
    <div class="row">
      <div class="field"><label>Job title / keywords</label>
        <input type="text" id="q" placeholder="e.g. Software Engineer"></div>
      <div class="field"><label>Location</label>
        <input type="text" id="loc" placeholder="e.g. Dhaka (optional)"></div>
    </div>
    <div class="row" style="align-items:flex-end;">
      <div class="field"><label>Max jobs</label>
        <select id="max">
          <option value="20">20 jobs</option>
          <option value="50" selected>50 jobs</option>
          <option value="100">100 jobs</option>
        </select>
      </div>
      <div class="field"><label>Source</label>
        <select id="agent-select"></select>
      </div>
      <div style="margin-bottom:16px;">
        <button class="btn btn-primary" onclick="startSearch()" id="search-btn">
          <span id="search-btn-inner">Search Jobs</span>
        </button>
      </div>
    </div>
    <div id="active-status" style="display:none;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="spin"></div>
        <span id="status-text" style="font-size:13px;color:var(--muted);">Initialising agent…</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress" style="width:10%"></div></div>
      <div id="queue-info"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="setTab('results')">Results</div>
    <div class="tab" onclick="setTab('saved')">Saved Jobs</div>
    <div class="tab" onclick="setTab('history')">History</div>
  </div>

  <!-- Results Tab -->
  <div id="tab-results" class="tab-content active">
    <div id="results-area">
      <div class="empty"><div class="empty-icon">🔍</div><p>Run a search to see results here.</p></div>
    </div>
  </div>

  <!-- Saved Tab -->
  <div id="tab-saved" class="tab-content">
    <div id="saved-area">
      <div class="empty"><div class="empty-icon">🔖</div><p>No saved jobs yet.</p></div>
    </div>
  </div>

  <!-- History Tab -->
  <div id="tab-history" class="tab-content">
    <div id="history-area">
      <div class="empty"><div class="empty-icon">📋</div><p>No searches yet.</p></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<script>
let pollTimer = null;
let activeSearchId = null;

// Init
(async () => {
  const agents = await api('/api/search/agents');
  const sel = document.getElementById('agent-select');
  agents.forEach(a => { const o=document.createElement('option'); o.value=a.key; o.textContent=a.label; sel.appendChild(o); });
  loadHistory();
  loadSaved();
  const u = getCookie('token') ? parseJwt(getCookie('token')) : null;
  if(u) document.getElementById('user-email').textContent = '';
})();

function setTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['results','saved','history'][i]===name));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='saved') loadSaved();
  if(name==='history') loadHistory();
}

async function startSearch() {
  const q = document.getElementById('q').value.trim();
  if(!q) { toast('Enter a search query','err'); return; }
  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  document.getElementById('active-status').style.display = 'block';
  setProgress(10, 'Queuing search…');
  try {
    const r = await api('/api/search','POST',{
      query:q, location:document.getElementById('loc').value.trim(),
      max_jobs:+document.getElementById('max').value,
      agent:document.getElementById('agent-select').value
    });
    activeSearchId = r.search_id;
    pollStatus();
  } catch(e) { toast('Failed to start search','err'); resetSearch(); }
}

function pollStatus() {
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    const s = await api(`/api/search/${activeSearchId}/status`).catch(()=>null);
    if(!s) return;
    if(s.status==='queued')  setProgress(15, 'Waiting in queue…');
    if(s.status==='running') setProgress(55, 'Agent searching BDJobs…');
    if(['success','partial','failed'].includes(s.status)) {
      clearInterval(pollTimer);
      if(s.status==='failed') { toast('Search failed','err'); resetSearch(); return; }
      setProgress(100, `Found ${s.total_found} jobs!`);
      await loadResults(activeSearchId);
      resetSearch(false);
      setTab('results');
      loadHistory();
      toast(`Done — ${s.total_found} jobs found`, 'ok');
    }
  }, 3000);
}

async function loadResults(sid) {
  const d = await api(`/api/search/${sid}/results`);
  const area = document.getElementById('results-area');
  if(!d.jobs.length){ area.innerHTML='<div class="empty"><div class="empty-icon">😕</div><p>No jobs found for this query.</p></div>'; return; }
  area.innerHTML = `
    <div class="results-header">
      <span style="color:var(--muted);font-size:13px;">${d.jobs.length} jobs · <b style="color:var(--text)">${d.search.query}</b></span>
      <button class="btn btn-ghost btn-sm" onclick="exportCSV(${JSON.stringify(d.jobs).replace(/"/g,'&quot;')})">Export CSV</button>
    </div>
    <div class="filter-row">
      <input type="text" placeholder="Filter results…" id="filter-input" oninput="filterJobs()" style="flex:2">
    </div>
    <div class="card" style="padding:0;overflow:hidden;">
    <div class="table-wrap">
    <table id="results-table">
      <thead><tr>
        <th>Title</th><th>Company</th><th>Location</th>
        <th>Type</th><th>Deadline</th><th>Salary</th><th></th>
      </tr></thead>
      <tbody id="results-body">
        ${d.jobs.map(j=>`<tr data-search="${(j.title+j.company+j.location).toLowerCase()}">
          <td><a class="job-url" href="${j.url||'#'}" target="_blank">${j.title||'—'}</a></td>
          <td>${j.company||'—'}</td><td>${j.location||'—'}</td>
          <td>${j.job_type||'—'}</td><td>${j.deadline||'—'}</td><td>${j.salary||'—'}</td>
          <td><button class="save-btn ${j.saved?'saved':''}" onclick="toggleSave(${j.id},this)" title="Save job">♥</button></td>
        </tr>`).join('')}
      </tbody>
    </table></div></div>`;
}

function filterJobs() {
  const q = document.getElementById('filter-input').value.toLowerCase();
  document.querySelectorAll('#results-body tr').forEach(tr => {
    tr.style.display = tr.dataset.search.includes(q) ? '' : 'none';
  });
}

async function toggleSave(jobId, btn) {
  const r = await api(`/api/search/jobs/${jobId}/save`,'POST');
  btn.classList.toggle('saved', r.saved);
}

async function loadSaved() {
  const jobs = await api('/api/search/saved');
  const area = document.getElementById('saved-area');
  if(!jobs.length){ area.innerHTML='<div class="empty"><div class="empty-icon">🔖</div><p>No saved jobs yet.</p></div>'; return; }
  area.innerHTML=`<div class="card" style="padding:0"><div class="table-wrap"><table>
    <thead><tr><th>Title</th><th>Company</th><th>Location</th><th>Search</th><th>URL</th></tr></thead>
    <tbody>${jobs.map(j=>`<tr>
      <td>${j.title||'—'}</td><td>${j.company||'—'}</td><td>${j.location||'—'}</td>
      <td style="color:var(--muted)">${j.query||''}</td>
      <td><a class="job-url" href="${j.url||'#'}" target="_blank">View</a></td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}

async function loadHistory() {
  const rows = await api('/api/search/history');
  const area = document.getElementById('history-area');
  if(!rows.length){ area.innerHTML='<div class="empty"><div class="empty-icon">📋</div><p>No searches yet.</p></div>'; return; }
  area.innerHTML=`<div class="card" style="padding:0"><div class="table-wrap"><table>
    <thead><tr><th>Query</th><th>Location</th><th>Source</th><th>Status</th><th>Jobs</th><th>Date</th><th></th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td><b>${r.query}</b></td><td>${r.location||'—'}</td><td>${r.agent}</td>
      <td><span class="badge badge-${r.status}">${r.status==='running'?'<span class="pulse"></span> ':''} ${r.status}</span></td>
      <td>${r.total_found}</td>
      <td style="color:var(--muted)">${r.created_at.slice(0,16)}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="reloadSearch(${r.id})">View</button></td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}

async function reloadSearch(sid) {
  await loadResults(sid);
  setTab('results');
}

function exportCSV(jobs) {
  const h = ['title','company','location','job_type','deadline','salary','experience','url'];
  const rows = [h.join(','), ...jobs.map(j=>h.map(k=>`"${(j[k]||'').replace(/"/g,'""')}"`).join(','))];
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(rows.join('\n'));
  a.download = 'jobs.csv'; a.click();
}

function setProgress(pct, msg) {
  document.getElementById('progress').style.width = pct+'%';
  document.getElementById('status-text').textContent = msg;
}

function resetSearch(hide=true) {
  document.getElementById('search-btn').disabled = false;
  if(hide) document.getElementById('active-status').style.display='none';
}

async function logout() {
  await fetch('/api/auth/logout',{method:'POST'});
  window.location.href='/';
}

// Helpers
async function api(url,method='GET',body=null) {
  const r = await fetch(url,{method,headers:body?{'Content-Type':'application/json'}:{},body:body?JSON.stringify(body):null});
  if(r.status===401){window.location.href='/';return;}
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
function getCookie(n){return document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith(n+'='))?.split('=')[1]||null;}
function parseJwt(t){try{return JSON.parse(atob(t.split('.')[1]));}catch{return null;}}
function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;setTimeout(()=>t.className='',2500);}
</script>
</body>
</html>
